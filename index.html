<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Фінансовий трекер</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5080d8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
:root{
  --g50:#eef7f0;--g400:#4daa6a;--g600:#2d7a47;
  --r50:#fdf0f0;--r400:#e05756;--r600:#a83130;
  --b50:#eef4fd;--b400:#5080d8;--b600:#2850a8;
  --p400:#9060d8;
  --s50:#f5f6f8;--s100:#e3e6ec;--s400:#7a88a0;--s800:#1e2a3a;
  --ink:#1e2a3a;--ink2:#4a5568;--ink3:#7a88a0;
  --surf:#ffffff;--bg:#f0f2f5;--brd:#e3e6ec;
  --R:24px;--Rs:14px;--Rx:10px;
  --sh:0 2px 12px rgba(30,42,58,.07);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:5rem;}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:500}

.app{max-width:500px;margin:0 auto;padding:1.5rem 1rem}
header{text-align:center;padding:1rem 0 1.5rem}
header h1{font-size:1.8rem; color:var(--b600)}

.tabs{display:flex;gap:5px;background:var(--s100);border-radius:var(--R);padding:5px;margin-bottom:1.5rem; position: sticky; top: 10px; z-index: 100; box-shadow: var(--sh);}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:.85rem;font-weight:700;color:var(--ink2);border-radius:var(--Rs);cursor:pointer;border:none;background:none;transition:0.2s;}
.tab.on{background:var(--surf);color:var(--ink);box-shadow:var(--sh)}

.page{display:none}.page.on{display:block}
.card{background:var(--surf);border-radius:var(--R);padding:1.25rem;box-shadow:var(--sh);margin-bottom:1rem}

.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.metric{background:var(--surf);border-radius:var(--R);padding:1.1rem;box-shadow:var(--sh);position:relative;overflow:hidden}
.metric::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px}
.metric.actual::after{background:var(--g400)}.metric.forecast::after{background:var(--b400)}.metric.safe::after{background:var(--p400)}
.mlbl{font-size:.65rem;font-weight:800;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.mval{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:500;}
.metric.full{grid-column: span 2;}

.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.action-item{background:var(--surf); padding:20px; border-radius:var(--R); box-shadow:var(--sh); text-align:center; cursor:pointer; transition:0.2s;}
.action-item:active{transform:scale(0.95); background:var(--s50)}
.action-icon{font-size:1.8rem; margin-bottom:8px; display:block;}
.action-label{font-weight:700; font-size:0.85rem; color:var(--ink)}

.wallet-manage-item{display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--s50); border-radius:var(--Rx); margin-top:8px;}
.w-m-info{display:flex; flex-direction:column;}
.w-m-name{font-weight:700; font-size:0.9rem;}
.w-m-bal{font-size:0.8rem; color:var(--ink3)}
.w-m-btns{display:flex; gap:8px;}

.btn{padding:12px; border-radius:var(--Rx); font-weight:700; cursor:pointer; border:none; font-size:0.9rem;}
.btn-b{background:var(--b400); color:#fff}
.btn-gh{background:var(--s100); color:var(--ink2)}
.btn-r-light{background:var(--r50); color:var(--r600); padding:6px 10px; font-size:0.75rem;}
.btn-b-light{background:var(--b50); color:var(--b600); padding:6px 10px; font-size:0.75rem;}

input, select{padding:12px; border:1.5px solid var(--brd); border-radius:var(--Rx); width:100%; font-size:1rem; margin-bottom:10px; outline:none;}
input:focus{border-color:var(--b400)}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:12px 24px;border-radius:99px;opacity:0;transition:0.3s;z-index:9999;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.tl-row{display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--s100)}
</style>
</head>
<body>
<div class="app">
    <header><h1>Мій спокій</h1></header>

    <div class="tabs">
        <button class="tab on" onclick="goPage('dashboard')">Стан</button>
        <button class="tab" onclick="goPage('timeline')">План</button>
        <button class="tab" onclick="goPage('actions')">Дії</button>
        <button class="tab" onclick="goPage('history')">Архів</button>
    </div>

    <div id="pg-dashboard" class="page on">
        <div class="dash-grid">
            <div class="metric actual"><div class="mlbl">На руках</div><div class="mval" id="dm-actual">0</div></div>
            <div class="metric forecast"><div class="mlbl">Прогноз</div><div class="mval" id="dm-forecast">0</div></div>
            <div class="metric full safe"><div class="mlbl">Ліміт на день (до кінця місяця)</div><div class="mval" id="dm-safe">0</div></div>
        </div>
        <div id="wallets-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1rem;"></div>
    </div>

    <div id="pg-timeline" class="page">
        <div class="card" id="tl-list"></div>
    </div>

    <div id="pg-actions" class="page">
        <div class="action-grid" id="main-action-menu">
            <div class="action-item" onclick="openSect('manage-wallets')"><span class="action-icon">💳</span><span class="action-label">Рахунки</span></div>
            <div class="action-item" onclick="openSect('transfer')"><span class="action-icon">⇄</span><span class="action-label">Переказ</span></div>
            <div class="action-item" onclick="openSect('add-income')"><span class="action-icon">💰</span><span class="action-label">+ Дохід</span></div>
            <div class="action-item" onclick="openSect('add-expense')"><span class="action-icon">📉</span><span class="action-label">- Витрата</span></div>
        </div>

        <div id="sect-manage-wallets" style="display:none; margin-top:20px;" class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><h3>Рахунки</h3><button class="btn btn-gh btn-sm" onclick="closeSects()">✕</button></div>
            <input type="text" id="w-name" placeholder="Назва рахунку"/>
            <input type="number" id="w-bal" placeholder="Поточний баланс"/>
            <input type="hidden" id="w-edit-id" value=""/>
            <button class="btn btn-b" style="width:100%" onclick="saveWallet()">Зберегти</button>
            <div id="wallets-manage-list" style="margin-top:15px;"></div>
        </div>

        <div id="sect-transfer" style="display:none; margin-top:20px;" class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><h3>Переказ</h3><button class="btn btn-gh btn-sm" onclick="closeSects()">✕</button></div>
            <select id="x-from"></select>
            <select id="x-to"></select>
            <input type="number" id="x-amt" placeholder="Сума"/>
            <button class="btn btn-b" style="width:100%" onclick="doTransfer()">Виконати</button>
        </div>

        <div id="sect-add-income" style="display:none; margin-top:20px;" class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><h3>Новий дохід</h3><button class="btn btn-gh btn-sm" onclick="closeSects()">✕</button></div>
            <input type="text" id="pi-name" placeholder="Джерело (напр. ФОП)"/>
            <input type="number" id="pi-amt" placeholder="Сума"/>
            <input type="date" id="pi-date"/>
            <button class="btn btn-b" style="width:100%" onclick="addPlanned('pi')">Запланувати</button>
        </div>

        <div id="sect-add-expense" style="display:none; margin-top:20px;" class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><h3>Нова витрата</h3><button class="btn btn-gh btn-sm" onclick="closeSects()">✕</button></div>
            <input type="text" id="pe-name" placeholder="Назва (напр. Оренда)"/>
            <input type="number" id="pe-amt" placeholder="Сума"/>
            <input type="date" id="pe-date"/>
            <button class="btn btn-b" style="width:100%" onclick="addPlanned('pe')">Запланувати</button>
        </div>
    </div>

    <div id="pg-history" class="page">
        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px">
                <button class="btn btn-gh btn-sm" onclick="exportData()">💾 Експорт</button>
                <button class="btn btn-gh btn-sm" onclick="document.getElementById('impFile').click()">📂 Імпорт</button>
                <input type="file" id="impFile" style="display:none" onchange="importData(event)">
            </div>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<div id="modal-wallet" class="modal-bg" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; max-width:350px;">
        <h3 id="mw-title">Підтвердження</h3>
        <select id="mw-select" style="margin-top:15px;"></select>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn btn-gh" style="flex:1" onclick="closeModal()">Скасувати</button>
            <button class="btn btn-b" style="flex:1" onclick="confirmModal()">Виконати</button>
        </div>
    </div>
</div>

<div class="toast" id="toast-el"></div>

<script>
const SK='ft_mobile_v2';
let S=ls();
let _cb=null;

function ls(){
    const d=localStorage.getItem(SK);
    return d ? JSON.parse(d) : {wallets:[{id:'w1',name:'Готівка',balance:0}], pIncomes:[], pExpenses:[], history:[]};
}
function save(){ localStorage.setItem(SK,JSON.stringify(S)); renderAll(); }

function renderAll(){
    const today = new Date(); today.setHours(0,0,0,0);
    const totalActual = S.wallets.reduce((s,w)=>s+w.balance,0);
    const sumPI = S.pIncomes.reduce((s,i)=>s+i.amount,0);
    const sumPE = S.pExpenses.reduce((s,i)=>s+i.amount,0);
    
    document.getElementById('dm-actual').innerText = fmt(totalActual);
    document.getElementById('dm-forecast').innerText = fmt(totalActual + sumPI - sumPE);
    
    const eom = new Date(today.getFullYear(), today.getMonth()+1, 0);
    const daysLeft = Math.max(1, Math.ceil((eom-today)/(864e5))+1);
    const oblig = S.pExpenses.filter(e=>{const d=pd(e.date); return d && d<=eom;}).reduce((s,e)=>s+e.amount,0);
    document.getElementById('dm-safe').innerText = fmt(Math.max(0, (totalActual - oblig)/daysLeft));

    renderWalletsGrid();
    renderTimeline(today);
    renderHistory();
    renderManageWallets();
    fillSelects();
}

function renderWalletsGrid(){
    const g = document.getElementById('wallets-grid');
    g.innerHTML = S.wallets.map(w => `<div class="metric" style="background:${w.balance<0?'#fff1f1':'#fff'}">
        <div class="mlbl">${w.name}</div><div class="mval">${fmt(w.balance)}</div>
    </div>`).join('');
}

function renderManageWallets(){
    const l = document.getElementById('wallets-manage-list');
    l.innerHTML = S.wallets.map(w => `
        <div class="wallet-manage-item">
            <div class="w-m-info"><span class="w-m-name">${w.name}</span><span class="w-m-bal">${fmt(w.balance)}</span></div>
            <div class="w-m-btns">
                <button class="btn btn-b-light" onclick="editWallet('${w.id}')">✎</button>
                <button class="btn btn-r-light" onclick="deleteWallet('${w.id}')">✕</button>
            </div>
        </div>
    `).join('');
}

function saveWallet(){
    const n = document.getElementById('w-name').value;
    const b = parseFloat(document.getElementById('w-bal').value) || 0;
    const id = document.getElementById('w-edit-id').value;
    if(!n) return toast("Назва?");
    if(id){
        const w = S.wallets.find(x => x.id == id);
        w.name = n; w.balance = b;
        document.getElementById('w-edit-id').value = "";
    } else {
        S.wallets.push({id: Date.now(), name: n, balance: b});
    }
    document.getElementById('w-name').value = "";
    document.getElementById('w-bal').value = "";
    save(); toast("Збережено");
}

function editWallet(id){
    const w = S.wallets.find(x => x.id == id);
    document.getElementById('w-name').value = w.name;
    document.getElementById('w-bal').value = w.balance;
    document.getElementById('w-edit-id').value = w.id;
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function deleteWallet(id){
    if(S.wallets.length <= 1) return toast("Останній рахунок!");
    if(confirm("Видалити?")){
        S.wallets = S.wallets.filter(x => x.id != id);
        save();
    }
}

function openSect(id){
    closeSects();
    document.getElementById('main-action-menu').style.display = 'none';
    document.getElementById('sect-'+id).style.display = 'block';
}

function closeSects(){
    ['manage-wallets', 'transfer', 'add-income', 'add-expense'].forEach(s => {
        document.getElementById('sect-'+s).style.display = 'none';
    });
    document.getElementById('main-action-menu').style.display = 'grid';
}

function doTransfer(){
    const fIdx = document.getElementById('x-from').value;
    const tIdx = document.getElementById('x-to').value;
    const amt = parseFloat(document.getElementById('x-amt').value);
    if(fIdx == tIdx || !amt) return toast("Перевірте дані");
    S.wallets[fIdx].balance -= amt;
    S.wallets[tIdx].balance += amt;
    addHist(`Переказ: ${S.wallets[fIdx].name} → ${S.wallets[tIdx].name}`, 0);
    document.getElementById('x-amt').value = "";
    save(); toast("Готово");
}

function addPlanned(type){
    const n = document.getElementById(type + '-name').value;
    const a = parseFloat(document.getElementById(type + '-amt').value);
    const d = document.getElementById(type + '-date').value;
    if(!n || isNaN(a) || !d) return toast("Заповніть усі поля");

    const target = (type === 'pi') ? S.pIncomes : S.pExpenses;
    target.push({id: Date.now(), name: n, amount: a, date: d});
    
    document.getElementById(type + '-name').value = "";
    document.getElementById(type + '-amt').value = "";
    document.getElementById(type + '-date').value = "";
    
    save(); toast("Заплановано");
}

function renderTimeline(today){
    const items = [
        ...S.pIncomes.map((e,i)=>({...e, type:'pi', idx:i})),
        ...S.pExpenses.map((e,i)=>({...e, type:'pe', idx:i}))
    ].sort((a,b)=> (pd(a.date) - pd(b.date)));

    const el = document.getElementById('tl-list');
    if(!items.length) { el.innerHTML = "<p style='text-align:center; color:var(--ink3)'>Планів немає</p>"; return; }

    el.innerHTML = items.map(item => {
        const d = pd(item.date);
        return `<div class="tl-row">
            <div style="width:40px; text-align:center">
                <div style="font-family:Fraunces; font-size:1.2rem">${d.getDate()}</div>
                <div style="font-size:0.6rem; text-transform:uppercase">${d.toLocaleDateString('uk-UA',{month:'short'})}</div>
            </div>
            <div style="flex:1">
                <div style="font-weight:700; font-size:0.85rem">${item.name}</div>
                <div style="font-size:0.7rem; color:${item.type=='pi'?'var(--g600)':'var(--r600)'}">${item.type=='pi'?'Очікуємо':'Сплачуємо'}</div>
            </div>
            <div style="text-align:right">
                <div style="font-weight:700; font-size:0.9rem">${item.type=='pi'?'+':'-'}${fmt(item.amount)}</div>
                <button class="btn btn-b-light" onclick="executePlan('${item.type}', ${item.idx})">OK</button>
            </div>
        </div>`;
    }).join('');
}

function executePlan(type, idx){
    const item = (type === 'pi') ? S.pIncomes[idx] : S.pExpenses[idx];
    _cb = (wi) => {
        const w = S.wallets[wi];
        if(type === 'pi') w.balance += item.amount; else w.balance -= item.amount;
        addHist(item.name, (type==='pi' ? item.amount : -item.amount));
        if(type === 'pi') S.pIncomes.splice(idx, 1); else S.pExpenses.splice(idx, 1);
        save(); closeModal();
    };
    document.getElementById('mw-title').innerText = item.name + ": " + fmt(item.amount);
    document.getElementById('modal-wallet').style.display = "flex";
}

function renderHistory(){
    const h = [...S.history].reverse().slice(0,30);
    document.getElementById('history-list').innerHTML = h.map(r => `
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--s50); font-size:0.85rem">
            <div><div style="font-weight:600">${r.name}</div><div style="font-size:0.7rem; color:var(--ink3)">${r.date}</div></div>
            <div style="font-weight:700; color:${r.amount>=0? (r.amount==0?'var(--b600)':'var(--g600)') : 'var(--r600)'}">${r.amount>0?'+':''}${r.amount==0?'info':fmt(r.amount)}</div>
        </div>`).join('');
}

function addHist(name, amount){
    S.history.push({name, amount, date: new Date().toLocaleString('uk-UA', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})});
}
function fillSelects(){
    const o = S.wallets.map((w,i)=>`<option value="${i}">${w.name}</option>`).join('');
    ['x-from', 'x-to', 'mw-select'].forEach(id => document.getElementById(id).innerHTML = o);
}
function goPage(p){
    document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('on'));
    document.getElementById('pg-'+p).classList.add('on');
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on', ['dashboard','timeline','actions','history'][i]===p));
}
function closeModal(){ document.getElementById('modal-wallet').style.display = "none"; }
function confirmModal(){ const wi = document.getElementById('mw-select').value; if(_cb) _cb(wi); }
function fmt(n){ return Math.round(n).toLocaleString() + ' ₴'; }
function pd(s){ if(!s) return null; const b=s.split('-'); return new Date(b[0], b[1]-1, b[2]); }
function toast(m){ const t=document.getElementById('toast-el'); t.innerText=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), 2000); }

function exportData(){
    const b = new Blob([JSON.stringify(S)], {type: "application/json"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(b);
    a.download = `backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importData(e){
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = (ex) => { S = JSON.parse(ex.target.result); save(); toast("Імпортовано!"); };
    r.readAsText(f);
}

renderAll();
</script>
</body>
</html>
